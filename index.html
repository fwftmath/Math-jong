<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>數神麻雀 Math-jong (AI 對戰版)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #2E8B57;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        h1 { margin-bottom: 5px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .info-bar { margin-bottom: 15px; font-size: 18px; font-weight: bold; color: #FFD700; }
        
        .board {
            width: 95%;
            max-width: 900px;
            background-color: #3CB371;
            border: 5px solid #8B4513;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            margin-bottom: 20px;
            text-align: center;
        }
        .area-title { margin: 10px 0 5px; font-weight: bold; color: #FFF8DC; }
        .deck-area, .discard-area, .hand-area, .bot-area {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            min-height: 80px;
            padding: 10px;
            background: rgba(0,0,0,0.1);
            border-radius: 8px;
        }
        .bot-area { min-height: 40px; font-size: 14px; color: #ddd; align-items: center;}

        /* 麻雀牌 CSS 設計 */
        .tile {
            width: 50px;
            height: 70px;
            background-color: #FFFAFA;
            color: #333;
            border-radius: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            font-weight: bold;
            box-shadow: 2px 4px 6px rgba(0,0,0,0.3), inset -2px -2px 4px rgba(0,0,0,0.1);
            user-select: none;
            transition: transform 0.1s;
        }
        .tile.playable { cursor: pointer; }
        .tile.playable:hover { transform: translateY(-5px); background-color: #fff; }
        .tile.deck { background-color: #DAA520; color: transparent; cursor: pointer; }
        .tile.deck:hover { background-color: #FFD700; }
        
        /* 棄牌堆特別樣式，稍微縮小 */
        .discard-area .tile { width: 40px; height: 56px; font-size: 16px; margin: 2px; }

        .controls { display: flex; gap: 15px; margin-top: 10px; }
        button {
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            background-color: #FFD700;
            color: #8B4513;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        button:hover { background-color: #FFF8DC; }
        button:disabled { background-color: #ccc; cursor: not-allowed; color: #666; }
        #status { margin-top: 15px; font-size: 18px; color: #FFF8DC; font-weight: bold; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 5px;}
    </style>
</head>
<body>

    <h1>🀄 數神麻雀 Math-jong</h1>
    <div class="info-bar">目前回合：<span id="turn-indicator">玩家</span></div>

    <div class="board">
        <div class="bot-area" id="bot-status">
            電腦 1 (下家): 10 張牌 | 電腦 2 (對家): 10 張牌 | 電腦 3 (上家): 10 張牌
        </div>

        <div class="area-title">牌堆 - 剩餘: <span id="deck-count">0</span></div>
        <div class="deck-area" id="deck-area">
            <div class="tile deck" id="deck-btn" onclick="humanDrawCard()">🀄</div>
        </div>

        <div class="area-title">棄牌堆 (大家打出的牌)</div>
        <div class="discard-area" id="discard-area"></div>

        <div class="area-title">你的手牌</div>
        <div class="hand-area" id="hand-area"></div>
    </div>

    <div class="controls">
        <button onclick="sortHand()">整理手牌</button>
        <button onclick="declareWin()" id="win-btn" disabled>宣告食糊！</button>
    </div>
    <div id="status">遊戲初始化中...</div>

    <script>
        const baseCards = ['-3', '-2', '-1', '0', '1', '2', '3', '4', '5', '1/2', '0.5', '2²', '4', '√16', 'x'];
        let deck = [];
        let discardPile = [];
        
        // 4名玩家：0是人類，1、2、3是電腦
        let players = [
            { id: 0, name: "你 (玩家)", hand: [], isBot: false },
            { id: 1, name: "電腦 1 (下家)", hand: [], isBot: true },
            { id: 2, name: "電腦 2 (對家)", hand: [], isBot: true },
            { id: 3, name: "電腦 3 (上家)", hand: [], isBot: true }
        ];
        
        const HAND_SIZE = 10;
        let currentTurn = 0; // 0代表玩家回合
        let hasDrawnThisTurn = false; // 記錄當前玩家是否已經摸牌

        function initGame() {
            // 生成牌堆並洗牌 (15種牌 x 4張 = 60張)
            deck = [];
            for (let i = 0; i < 4; i++) {
                deck = deck.concat(baseCards);
            }
            shuffle(deck);
            
            discardPile = [];
            
            // 為4位玩家發牌
            players.forEach(player => {
                player.hand = [];
                for(let i=0; i<HAND_SIZE; i++){
                    player.hand.push(deck.pop());
                }
            });
            
            currentTurn = 0; // 由人類玩家先開始
            hasDrawnThisTurn = false;
            
            updateUI();
            setStatus("遊戲開始！請點擊牌堆摸牌。");
            document.getElementById('deck-btn').style.pointerEvents = 'auto';
        }

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        // ================= 人類玩家動作 =================

        function humanDrawCard() {
            if (currentTurn !== 0) {
                setStatus("現在不是你的回合！");
                return;
            }
            if (hasDrawnThisTurn) {
                setStatus("你已經摸過牌了，請打出一張牌。");
                return;
            }
            if (deck.length === 0) {
                setStatus("牌堆沒牌了，流局！");
                return;
            }

            players[0].hand.push(deck.pop());
            hasDrawnThisTurn = true;
            
            updateUI();
            setStatus("摸牌完成，請選擇一張手牌打出。");
            document.getElementById('win-btn').disabled = false;
        }

        function humanDiscardCard(index) {
            if (currentTurn !== 0) return;
            if (!hasDrawnThisTurn) {
                setStatus("你必須先摸牌，才能打牌。");
                return;
            }

            const discardedCard = players[0].hand.splice(index, 1)[0];
            discardPile.push(discardedCard);
            
            document.getElementById('win-btn').disabled = true;
            
            endTurn(); // 結束玩家回合，交給下一位
        }

        function sortHand() {
            players[0].hand.sort((a, b) => {
                let valA = parseTileValue(a);
                let valB = parseTileValue(b);
                return valA - valB;
            });
            updateUI();
        }

        function parseTileValue(tile) {
            if (tile === 'x') return 999;
            if (tile === '1/2') return 0.5;
            if (tile === '2²') return 4;
            if (tile === '√16') return 4;
            return parseFloat(tile);
        }

        // ================= 回合與電腦 AI 邏輯 =================

        function endTurn() {
            hasDrawnThisTurn = false;
            currentTurn = (currentTurn + 1) % 4; // 0->1->2->3->0 循環
            updateUI();

            if (currentTurn !== 0) {
                // 如果是電腦回合，鎖定玩家操作，並呼叫 AI
                document.getElementById('deck-btn').style.pointerEvents = 'none';
                setStatus(`等待 ${players[currentTurn].name} 思考中...`);
                
                // 設定 1.5 秒延遲，讓人類有時間看清楚節奏
                setTimeout(botTurn, 1500); 
            } else {
                // 輪回人類玩家
                document.getElementById('deck-btn').style.pointerEvents = 'auto';
                setStatus("輪到你了！請摸牌。");
            }
        }

        function botTurn() {
            let bot = players[currentTurn];
            
            // 1. 電腦摸牌
            if (deck.length === 0) {
                setStatus("牌堆沒牌了，流局！");
                return;
            }
            bot.hand.push(deck.pop());
            
            // 2. 電腦打牌 (等級 1：完全隨機挑選一張手牌)
            // 產生 0 到 10 (共11張牌) 的隨機索引
            let randomIndex = Math.floor(Math.random() * bot.hand.length);
            let discardedCard = bot.hand.splice(randomIndex, 1)[0];
            discardPile.push(discardedCard);
            
            setStatus(`${bot.name} 打出了 [ ${discardedCard} ]`);
            
            // 3. 結束電腦回合，交給下一個
            // 再加一點短暫延遲讓玩家看到它打什麼，再進入下一回合
            setTimeout(endTurn, 1000);
        }

        // ================= 介面更新 =================

        function declareWin() {
            if (players[0].hand.length !== HAND_SIZE + 1) return;
            alert(`你宣告食糊！\n你的手牌是: [ ${players[0].hand.join(', ')} ]\n請向老師展示你的數學組合！`);
        }

        function updateUI() {
            document.getElementById('turn-indicator').innerText = players[currentTurn].name;
            document.getElementById('deck-count').innerText = deck.length;
            
            // 更新電腦狀態文字
            document.getElementById('bot-status').innerText = 
                `電腦 1 (下家): ${players[1].hand.length} 張牌 | ` +
                `電腦 2 (對家): ${players[2].hand.length} 張牌 | ` +
                `電腦 3 (上家): ${players[3].hand.length} 張牌`;

            // 渲染玩家手牌
            const handDiv = document.getElementById('hand-area');
            handDiv.innerHTML = '';
            players[0].hand.forEach((card, index) => {
                const tile = document.createElement('div');
                tile.className = 'tile playable';
                tile.innerText = card;
                tile.onclick = () => humanDiscardCard(index);
                handDiv.appendChild(tile);
            });

            // 渲染棄牌堆
            const discardDiv = document.getElementById('discard-area');
            discardDiv.innerHTML = '';
            discardPile.forEach((card) => {
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.innerText = card;
                discardDiv.appendChild(tile);
            });
        }

        function setStatus(msg) {
            document.getElementById('status').innerText = msg;
        }

        // 啟動遊戲
        window.onload = initGame;
    </script>
</body>
</html>
